version: 2

project_name: papercuts

before:
  hooks:
    - go mod tidy

builds:
  - id: papercut
    main: ./cmd/papercut
    binary: papercut
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: papercut
    ids:
      - papercut
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  github:
    owner: jergason
    name: papercuts
